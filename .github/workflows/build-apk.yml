name: Build APK Android
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Construction de l'environnement PWA → APK
        run: |
          mkdir -p capacitor-app/www
          rsync -av --exclude='capacitor-app' --exclude='.git' --exclude='.github' ./ capacitor-app/www/
          cd capacitor-app
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init "App" "com.brahim.app" --web-dir www
          npx cap add android

      - name: Compilation de l'APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Sauvegarde de l'Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: APK-Debug
          path: capacitor-app/android/app/build/outputs/apk/debug/app-debug.apk
