name: Build APK Android
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Construction de l'environnement PWA → APK
        run: |
          mkdir -p capacitor-app/www
          rsync -av --exclude='capacitor-app' --exclude='.git' --exclude='.github' ./ capacitor-app/www/
          cd capacitor-app
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init "Kalpin" "com.brahim.kalpin" --web-dir www
          npx cap add android

      - name: Génération automatique de l'icône
        run: |
          cd capacitor-app
          npm install -D @capacitor/assets
          mkdir -p assets
          if [ -f "../icon.png" ]; then
            cp ../icon.png assets/icon.png
            npx @capacitor/assets generate --android
          else
            echo "❌ icon.png introuvable à la racine du dépôt !"
            exit 1
          fi

      - name: Résolution des conflits de doublons Kotlin
        run: |
          echo "configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }" >> capacitor-app/android/app/build.gradle

      - name: Compilation de l'APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renommer l'APK avec le nom du projet
        run: |
          cd capacitor-app/android/app/build/outputs/apk/debug/
          mv app-debug.apk Kalpin-debug.apk

      - name: Sauvegarde de l'Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: APK-Debug
          path: capacitor-app/android/app/build/outputs/apk/debug/Kalpin-debug.apk
