name: Build APK Android
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Construction de l'environnement PWA → APK
        run: |
          mkdir -p capacitor-app/www
          rsync -av --exclude='capacitor-app' --exclude='.git' --exclude='.github' ./ capacitor-app/www/
          cd capacitor-app
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.brahim.kalpin",
          "appName": "Kalpin",
          "webDir": "www",
          "bundledWebRuntime": true
        }
        EOF
          npx cap init "Kalpin" "com.brahim.kalpin" --web-dir www
          npx cap add android

      - name: 🔌 Téléchargement et injection chirurgicale du Bridge (split + pop)
        run: |
          cd capacitor-app/www
          MAIN_HTML=$(find . -maxdepth 1 -name "*.html" | head -n 1)
          if [ -z "$MAIN_HTML" ]; then
            echo "⚠️ Aucun fichier HTML trouvé"
          else
            echo "📄 Téléchargement du Bridge..."
            curl -s -o bridge.js "https://raw.githubusercontent.com/mekeirish/APK-Creator/main/bridge.js" || {
              echo "⚠️ Téléchargement échoué, création d'un bridge minimal"
              cat > bridge.js << 'EOFBRIDGE'
        (function(){
          window.AppBridge = {
            isNative: function(){ return !!(window.Capacitor && window.Capacitor.Plugins); },
            haptics: {
              vibrate: function(d){ if(navigator.vibrate) navigator.vibrate(d||200); }
            },
            storage: {
              set: function(k,v){ localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v)); },
              get: function(k){ return Promise.resolve(localStorage.getItem(k)); }
            },
            toast: function(msg,d){
              var el=document.createElement('div');
              el.textContent=msg;
              el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:12px;z-index:999;';
              document.body.appendChild(el);
              setTimeout(function(){ el.style.opacity='0'; setTimeout(function(){ el.remove(); },300); }, d||2000);
            }
          };
        })();
        EOFBRIDGE
            }
            if [ -f "../node_modules/@capacitor/core/dist/capacitor.js" ]; then
              cp ../node_modules/@capacitor/core/dist/capacitor.js capacitor.js
            else
              echo "⚠️ capacitor.js introuvable"
              touch capacitor.js
            fi
            node -e "
              const fs = require('fs');
              const htmlFile = '${MAIN_HTML}';
              let content = fs.readFileSync(htmlFile, 'utf8');
              let parts = content.split(/<\/body>/i);
              if (parts.length > 1) {
                let lastPart = parts.pop();
                let scripts = '<script src="capacitor.js"><\/script>\n<script src="bridge.js"><\/script>\n</body>';
                let newContent = parts.join('</body>') + scripts + lastPart;
                fs.writeFileSync(htmlFile, newContent, 'utf8');
                console.log('✅ Bridge injecté chirurgicalement à la toute fin (dernier </body>)');
              } else {
                console.log('⚠️ Aucun </body> trouvé, injection à la fin du fichier');
                fs.appendFileSync(htmlFile, '<script src="capacitor.js"><\/script>\n<script src="bridge.js"><\/script>\n');
              }
            "
          fi

      - name: 🔄 Synchronisation des assets vers Android
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Génération automatique de l'icône
        run: |
          cd capacitor-app
          npm install -D @capacitor/assets
          mkdir -p assets
          if [ -f "../icon.png" ]; then
            cp ../icon.png assets/icon.png
            npx @capacitor/assets generate --android
          else
            echo "⚠️ icon.png introuvable"
          fi

      - name: Résolution des conflits Kotlin
        run: |
          echo "configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }" >> capacitor-app/android/app/build.gradle

      - name: Compilation de l'APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renommer l'APK
        run: |
          cd capacitor-app/android/app/build/outputs/apk/debug/
          mv app-debug.apk Kalpin-debug.apk

      - name: Publication de l'APK en Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "capacitor-app/android/app/build/outputs/apk/debug/Kalpin-debug.apk"
          tag: "latest"
          name: "Kalpin Latest Build"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}