<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberNotebook PWA - Vectoriel</title>
    <meta name="theme-color" content="#050505">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        canvas { touch-action: none; }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const CyberNotebookApp = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [isDrawingMode, setIsDrawingMode] = useState(false);
            const [selectedColor, setSelectedColor] = useState("#00f2ff");
            const [selectedWidth, setSelectedWidth] = useState(2.5);
            const [pagesVectors, setPagesVectors] = useState({});
            const [undoStacks, setUndoStacks] = useState({});
            const [redoStacks, setRedoStacks] = useState({});
            const [showSelector, setShowSelector] = useState(false);
            const [showConfirmClear, setShowConfirmClear] = useState(false);
            const confirmTimeoutRef = useRef(null);
            const audioCtxRef = useRef(null);

            const canvasRef = useRef(null);
            const colors = ["#00f2ff", "#ff007a", "#7aff00", "#ffcc00", "#ff5e00", "#a855f7", "#ffffff", "#888888", "#000000"];

            // Augmentation de la hauteur de dessin pour mieux utiliser l'espace
            const DISPLAY_WIDTH = 360;
            const DISPLAY_HEIGHT = 560;  // encore plus haut
            const [canvasSize, setCanvasSize] = useState({ width: DISPLAY_WIDTH, height: DISPLAY_HEIGHT });

            const currentPathPoints = useRef([]);
            const isDrawing = useRef(false);

            // Initialisation AudioContext pour les sons
            useEffect(() => {
                audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                return () => {
                    if (audioCtxRef.current) audioCtxRef.current.close();
                };
            }, []);

            const playBeep = useCallback(() => {
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.value = 0.2;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.2);
                osc.stop(ctx.currentTime + 0.2);
            }, []);

            const toggleDrawingMode = useCallback(() => {
                setIsDrawingMode(prev => !prev);
                playBeep();
            }, [playBeep]);

            const updateCanvasSize = useCallback(() => {
                const dpr = window.devicePixelRatio || 1;
                setCanvasSize({
                    width: Math.floor(DISPLAY_WIDTH * dpr),
                    height: Math.floor(DISPLAY_HEIGHT * dpr)
                });
            }, []);

            const renderCanvas = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;

                ctx.fillStyle = "#0f0f12";
                ctx.fillRect(0, 0, w, h);

                const paths = pagesVectors[currentPage] || [];
                for (const path of paths) {
                    if (!path.points || path.points.length < 2) continue;
                    ctx.beginPath();
                    ctx.moveTo(path.points[0].x * w / DISPLAY_WIDTH, path.points[0].y * h / DISPLAY_HEIGHT);
                    for (let i = 1; i < path.points.length; i++) {
                        ctx.lineTo(path.points[i].x * w / DISPLAY_WIDTH, path.points[i].y * h / DISPLAY_HEIGHT);
                    }
                    ctx.strokeStyle = path.color;
                    ctx.lineWidth = (path.lineWidth || 2.5) * (w / DISPLAY_WIDTH);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }
            }, [pagesVectors, currentPage, canvasSize]);

            useEffect(() => {
                const saved = localStorage.getItem('cyberNotebook_vectors');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        setPagesVectors(data.pagesVectors || {});
                        setUndoStacks(data.undoStacks || {});
                        setRedoStacks(data.redoStacks || {});
                    } catch(e) {}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('cyberNotebook_vectors', JSON.stringify({
                    pagesVectors,
                    undoStacks,
                    redoStacks
                }));
            }, [pagesVectors, undoStacks, redoStacks]);

            useEffect(() => {
                renderCanvas();
            }, [renderCanvas, currentPage, canvasSize]);

            const getCanvasCoords = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const cssX = (clientX - rect.left) / rect.width;
                const cssY = (clientY - rect.top) / rect.height;
                const x = Math.min(Math.max(cssX * DISPLAY_WIDTH, 0), DISPLAY_WIDTH);
                const y = Math.min(Math.max(cssY * DISPLAY_HEIGHT, 0), DISPLAY_HEIGHT);
                return { x, y };
            };

            const startDrawing = (e) => {
                if (!isDrawingMode) return;
                e.preventDefault();
                const { x, y } = getCanvasCoords(e);
                currentPathPoints.current = [{ x, y }];
                isDrawing.current = true;
            };

            const draw = (e) => {
                if (!isDrawingMode || !isDrawing.current) return;
                e.preventDefault();
                const { x, y } = getCanvasCoords(e);
                currentPathPoints.current.push({ x, y });
                renderCanvas();
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;
                if (currentPathPoints.current.length >= 2) {
                    ctx.beginPath();
                    ctx.moveTo(currentPathPoints.current[0].x * w / DISPLAY_WIDTH, currentPathPoints.current[0].y * h / DISPLAY_HEIGHT);
                    for (let i = 1; i < currentPathPoints.current.length; i++) {
                        ctx.lineTo(currentPathPoints.current[i].x * w / DISPLAY_WIDTH, currentPathPoints.current[i].y * h / DISPLAY_HEIGHT);
                    }
                    ctx.strokeStyle = selectedColor;
                    ctx.lineWidth = selectedWidth * (w / DISPLAY_WIDTH);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }
            };

            const stopDrawing = () => {
                if (!isDrawingMode || !isDrawing.current) return;
                isDrawing.current = false;
                if (currentPathPoints.current.length >= 2) {
                    const newPath = {
                        color: selectedColor,
                        lineWidth: selectedWidth,
                        points: [...currentPathPoints.current]
                    };
                    const currentPaths = pagesVectors[currentPage] || [];
                    const newPaths = [...currentPaths, newPath];
                    setPagesVectors(prev => ({ ...prev, [currentPage]: newPaths }));
                    setRedoStacks(prev => ({ ...prev, [currentPage]: [] }));
                    const currentUndo = undoStacks[currentPage] || [];
                    setUndoStacks(prev => ({ ...prev, [currentPage]: [...currentUndo, newPath] }));
                }
                currentPathPoints.current = [];
            };

            const undo = () => {
                const currentPaths = pagesVectors[currentPage] || [];
                if (currentPaths.length === 0) return;
                const lastPath = currentPaths[currentPaths.length - 1];
                const newPaths = currentPaths.slice(0, -1);
                setPagesVectors(prev => ({ ...prev, [currentPage]: newPaths }));
                const currentRedo = redoStacks[currentPage] || [];
                setRedoStacks(prev => ({ ...prev, [currentPage]: [...currentRedo, lastPath] }));
                const currentUndo = undoStacks[currentPage] || [];
                setUndoStacks(prev => ({ ...prev, [currentPage]: currentUndo.slice(0, -1) }));
            };

            const redo = () => {
                const currentRedo = redoStacks[currentPage] || [];
                if (currentRedo.length === 0) return;
                const lastRedo = currentRedo[currentRedo.length - 1];
                const newRedo = currentRedo.slice(0, -1);
                setRedoStacks(prev => ({ ...prev, [currentPage]: newRedo }));
                const currentPaths = pagesVectors[currentPage] || [];
                const newPaths = [...currentPaths, lastRedo];
                setPagesVectors(prev => ({ ...prev, [currentPage]: newPaths }));
                const currentUndo = undoStacks[currentPage] || [];
                setUndoStacks(prev => ({ ...prev, [currentPage]: [...currentUndo, lastRedo] }));
            };

            const clearCurrentPage = () => {
                setPagesVectors(prev => ({ ...prev, [currentPage]: [] }));
                setUndoStacks(prev => ({ ...prev, [currentPage]: [] }));
                setRedoStacks(prev => ({ ...prev, [currentPage]: [] }));
                setShowConfirmClear(false);
                if (confirmTimeoutRef.current) clearTimeout(confirmTimeoutRef.current);
                renderCanvas();
            };

            const cancelClear = () => {
                setShowConfirmClear(false);
                if (confirmTimeoutRef.current) clearTimeout(confirmTimeoutRef.current);
            };

            const handleTrashClick = () => {
                if (showConfirmClear) return;
                setShowConfirmClear(true);
                confirmTimeoutRef.current = setTimeout(() => {
                    setShowConfirmClear(false);
                }, 5000);
            };

            const exportAsPNG = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `page_${currentPage + 1}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 'image/png');
            };

            const goToPage = (page) => {
                if (page >= 0) {
                    setCurrentPage(page);
                    currentPathPoints.current = [];
                    isDrawing.current = false;
                }
            };

            useEffect(() => {
                updateCanvasSize();
                const mediaQuery = window.matchMedia(`(resolution: ${window.devicePixelRatio}dppx)`);
                const handleChange = () => updateCanvasSize();
                mediaQuery.addEventListener('change', handleChange);
                return () => mediaQuery.removeEventListener('change', handleChange);
            }, [updateCanvasSize]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                canvas.width = canvasSize.width;
                canvas.height = canvasSize.height;
                canvas.style.width = `${DISPLAY_WIDTH}px`;
                canvas.style.height = `${DISPLAY_HEIGHT}px`;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                renderCanvas();
            }, [canvasSize, renderCanvas]);

            useEffect(() => {
                return () => {
                    if (confirmTimeoutRef.current) clearTimeout(confirmTimeoutRef.current);
                };
            }, []);

            return (
                <div className="fixed inset-0 bg-[#050505] flex items-center justify-center p-2 font-mono">
                    <div className="w-[360px] min-h-screen max-h-screen bg-[#0a0a0c] border border-[#2d2d3a] rounded-3xl shadow-[0_0_40px_rgba(0,242,255,0.05)] overflow-y-auto flex flex-col relative">
                        <div className="flex flex-col p-4 border-b border-[#1e1e24] bg-[#0f0f12]/80 gap-3">
                            <div className="flex justify-between items-center">
                                <button onClick={toggleDrawingMode} className={`w-8 h-8 rounded-lg ${isDrawingMode ? 'bg-cyan-500/20 text-cyan-400' : 'bg-[#1a1a24] text-[#444]'}`}>🖊</button>
                                <div className="flex gap-2">
                                    <button onClick={undo} className="w-8 h-8 rounded-lg bg-[#1a1a24] text-[#888]">↶</button>
                                    <button onClick={redo} className="w-8 h-8 rounded-lg bg-[#1a1a24] text-[#888]">↷</button>
                                </div>
                            </div>
                            <div className="flex justify-center gap-1.5">
                                {colors.map((c) => (
                                    <button key={c} onClick={() => setSelectedColor(c)} className={`w-6 h-6 rounded-full shadow-[inset_2px_2px_4px_rgba(0,0,0,0.5)] border-2 ${selectedColor === c ? 'border-white' : 'border-transparent'}`} style={{ backgroundColor: c }} />
                                ))}
                            </div>
                            <div className="flex justify-center gap-2 mt-1">
                                <label className="text-xs text-gray-400">Épaisseur :</label>
                                <input type="range" min="1" max="10" step="0.5" value={selectedWidth} onChange={(e) => setSelectedWidth(parseFloat(e.target.value))} className="w-32" />
                                <span className="text-xs text-cyan-400">{selectedWidth}px</span>
                            </div>
                        </div>

                        <canvas 
                            ref={canvasRef} 
                            className="touch-none cursor-crosshair w-full" 
                            style={{ width: `${DISPLAY_WIDTH}px`, height: `${DISPLAY_HEIGHT}px`, display: 'block', margin: '0 auto' }}
                            onMouseDown={startDrawing}
                            onMouseMove={draw}
                            onMouseUp={stopDrawing}
                            onMouseLeave={stopDrawing}
                            onTouchStart={startDrawing}
                            onTouchMove={(e) => { if(isDrawingMode) e.preventDefault(); draw(e); }}
                            onTouchEnd={stopDrawing}
                        />

                        {/* Footer compact avec tout intégré */}
                        <div className="flex items-center justify-between gap-2 border-t border-[#1e1e24] bg-[#0f0f12] py-2 px-4">
                            <div className="flex items-center gap-6">
                                <button onClick={() => goToPage(currentPage - 1)} className="w-10 h-10 rounded-full border border-[#2d2d3a] text-[#888]">◀</button>
                                <button onClick={() => setShowSelector(true)} className="text-xl font-bold text-[#00f2ff]">{String(currentPage + 1).padStart(2, '0')}</button>
                                <button onClick={() => goToPage(currentPage + 1)} className="w-10 h-10 rounded-full border border-[#2d2d3a] text-[#888]">▶</button>
                            </div>

                            <div className="flex items-center gap-2">
                                {!showConfirmClear ? (
                                    <>
                                        <button
                                            onClick={handleTrashClick}
                                            className="w-10 h-10 rounded-full flex items-center justify-center border border-[#2d2d3a] bg-[#1a1a24] hover:bg-red-500/10 transition-all duration-200"
                                            title="Vider la page"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400">
                                                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                                <line x1="10" y1="11" x2="10" y2="17" />
                                                <line x1="14" y1="11" x2="14" y2="17" />
                                            </svg>
                                        </button>
                                        <button
                                            onClick={exportAsPNG}
                                            className="w-10 h-10 rounded-full flex items-center justify-center border border-[#2d2d3a] bg-[#1a1a24] hover:bg-cyan-500/10 transition-all duration-200"
                                            title="Exporter la page en PNG"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400">
                                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                                <polyline points="7 10 12 15 17 10" />
                                                <line x1="12" y1="15" x2="12" y2="3" />
                                            </svg>
                                        </button>
                                        <img 
                                            src="https://i.ibb.co/VWpZCsDr/dfg-1.png" 
                                            alt="Logo" 
                                            style={{ width: '36px', height: 'auto', opacity: 0.5 }}
                                            className="opacity-50 ml-1 pointer-events-none select-none"
                                        />
                                    </>
                                ) : (
                                    <div className="flex gap-2 items-center animate-pulse">
                                        <span className="text-xs text-red-400 font-mono">Vider ?</span>
                                        <button
                                            onClick={clearCurrentPage}
                                            className="w-8 h-8 rounded-full bg-red-500/20 border border-red-500 flex items-center justify-center"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-red-400">
                                                <polyline points="20 6 9 17 4 12" />
                                            </svg>
                                        </button>
                                        <button
                                            onClick={cancelClear}
                                            className="w-8 h-8 rounded-full bg-gray-700/50 border border-gray-500 flex items-center justify-center"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-gray-300">
                                                <line x1="18" y1="6" x2="6" y2="18" />
                                                <line x1="6" y1="6" x2="18" y2="18" />
                                            </svg>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {showSelector && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-[#121216] border border-[#2d2d3a] p-6 rounded-2xl w-60 text-center">
                                <p className="text-white mb-4 text-sm uppercase">Navigation</p>
                                <input type="number" defaultValue={currentPage + 1} className="w-full bg-[#1a1a24] text-cyan-400 text-center p-3 rounded-lg mb-4" onChange={(e) => goToPage(Math.max(0, parseInt(e.target.value) - 1))} />
                                <button onClick={() => setShowSelector(false)} className="w-full bg-cyan-500/20 text-cyan-400 py-2 rounded-lg">CONFIRMER</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CyberNotebookApp />);
    </script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
