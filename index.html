<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberNotebook PWA - Livres Vectoriels</title>
    <meta name="theme-color" content="#050505">
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        canvas { touch-action: none; }
        .long-press-active { background-color: rgba(0, 242, 255, 0.2); }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const CyberNotebookApp = () => {
            // --- État principal multi-livres ---
            const [books, setBooks] = useState({});
            const [currentBookName, setCurrentBookName] = useState("Brouillon");
            const [currentPage, setCurrentPage] = useState(0);
            const [isDrawingMode, setIsDrawingMode] = useState(false);
            const [selectedColor, setSelectedColor] = useState("#00f2ff");
            const [selectedWidth, setSelectedWidth] = useState(2.5);
            const [showSelector, setShowSelector] = useState(false);
            const [showConfirmClear, setShowConfirmClear] = useState(false);
            const [showBookModal, setShowBookModal] = useState(false);
            const [showBookManageModal, setShowBookManageModal] = useState(false);
            const [newBookName, setNewBookName] = useState("");
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const confirmTimeoutRef = useRef(null);
            const audioCtxRef = useRef(null);
            const canvasRef = useRef(null);
            const longPressTimer = useRef(null);
            const colors = ["#00f2ff", "#ff007a", "#7aff00", "#ffcc00", "#ff5e00", "#a855f7", "#ffffff", "#888888", "#000000"];

            // Dimensions canvas
            const DISPLAY_WIDTH = 360;
            const DISPLAY_HEIGHT = 560;
            const [canvasSize, setCanvasSize] = useState({ width: DISPLAY_WIDTH, height: DISPLAY_HEIGHT });
            const currentPathPoints = useRef([]);
            const isDrawing = useRef(false);

            // ========== Initialisation Audio ==========
            useEffect(() => {
                audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                return () => { if (audioCtxRef.current) audioCtxRef.current.close(); };
            }, []);

            const playBeep = useCallback((frequency = 880, duration = 0.2, volume = 0.2) => {
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = frequency;
                gain.gain.value = volume;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
                osc.stop(ctx.currentTime + duration);
            }, []);

            // ========== Gestion Livres / Persistance ==========
            useEffect(() => {
                const saved = localStorage.getItem('cyberNotebook_books');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        setBooks(data);
                        if (!data["Brouillon"]) {
                            setBooks(prev => ({ ...prev, ["Brouillon"]: { pagesVectors: {}, undoStacks: {}, redoStacks: {} } }));
                        }
                    } catch(e) {}
                } else {
                    // Livre par défaut
                    setBooks({ "Brouillon": { pagesVectors: {}, undoStacks: {}, redoStacks: {} } });
                }
            }, []);

            useEffect(() => {
                if (Object.keys(books).length > 0) {
                    localStorage.setItem('cyberNotebook_books', JSON.stringify(books));
                }
            }, [books]);

            // Obtenir les données du livre courant
            const currentBookData = books[currentBookName] || { pagesVectors: {}, undoStacks: {}, redoStacks: {} };
            const pagesVectors = currentBookData.pagesVectors || {};
            const undoStacks = currentBookData.undoStacks || {};
            const redoStacks = currentBookData.redoStacks || {};

            const updateBookData = (newPagesVectors, newUndoStacks, newRedoStacks) => {
                setBooks(prev => ({
                    ...prev,
                    [currentBookName]: {
                        pagesVectors: newPagesVectors,
                        undoStacks: newUndoStacks,
                        redoStacks: newRedoStacks
                    }
                }));
            };

            // ========== Rendu vectoriel ==========
            const renderCanvas = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;
                ctx.fillStyle = "#0f0f12";
                ctx.fillRect(0, 0, w, h);

                const paths = pagesVectors[currentPage] || [];
                for (const path of paths) {
                    if (!path.points || path.points.length < 2) continue;
                    ctx.beginPath();
                    ctx.moveTo(path.points[0].x * w / DISPLAY_WIDTH, path.points[0].y * h / DISPLAY_HEIGHT);
                    for (let i = 1; i < path.points.length; i++) {
                        ctx.lineTo(path.points[i].x * w / DISPLAY_WIDTH, path.points[i].y * h / DISPLAY_HEIGHT);
                    }
                    ctx.strokeStyle = path.color;
                    ctx.lineWidth = (path.lineWidth || 2.5) * (w / DISPLAY_WIDTH);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }
            }, [pagesVectors, currentPage, canvasSize]);

            useEffect(() => { renderCanvas(); }, [renderCanvas, currentPage, canvasSize]);

            // ========== Gestion du dessin ==========
            const getCanvasCoords = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const cssX = (clientX - rect.left) / rect.width;
                const cssY = (clientY - rect.top) / rect.height;
                return { x: Math.min(Math.max(cssX * DISPLAY_WIDTH, 0), DISPLAY_WIDTH), y: Math.min(Math.max(cssY * DISPLAY_HEIGHT, 0), DISPLAY_HEIGHT) };
            };

            const startDrawing = (e) => {
                if (!isDrawingMode) return;
                e.preventDefault();
                const { x, y } = getCanvasCoords(e);
                currentPathPoints.current = [{ x, y }];
                isDrawing.current = true;
            };

            const draw = (e) => {
                if (!isDrawingMode || !isDrawing.current) return;
                e.preventDefault();
                const { x, y } = getCanvasCoords(e);
                currentPathPoints.current.push({ x, y });
                renderCanvas();
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;
                if (currentPathPoints.current.length >= 2) {
                    ctx.beginPath();
                    ctx.moveTo(currentPathPoints.current[0].x * w / DISPLAY_WIDTH, currentPathPoints.current[0].y * h / DISPLAY_HEIGHT);
                    for (let i = 1; i < currentPathPoints.current.length; i++) {
                        ctx.lineTo(currentPathPoints.current[i].x * w / DISPLAY_WIDTH, currentPathPoints.current[i].y * h / DISPLAY_HEIGHT);
                    }
                    ctx.strokeStyle = selectedColor;
                    ctx.lineWidth = selectedWidth * (w / DISPLAY_WIDTH);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }
            };

            const stopDrawing = () => {
                if (!isDrawingMode || !isDrawing.current) return;
                isDrawing.current = false;
                if (currentPathPoints.current.length >= 2) {
                    const newPath = { color: selectedColor, lineWidth: selectedWidth, points: [...currentPathPoints.current] };
                    const currentPaths = pagesVectors[currentPage] || [];
                    const newPaths = [...currentPaths, newPath];
                    const newPagesVectors = { ...pagesVectors, [currentPage]: newPaths };
                    const newUndoStacks = { ...undoStacks, [currentPage]: [...(undoStacks[currentPage] || []), newPath] };
                    const newRedoStacks = { ...redoStacks, [currentPage]: [] };
                    updateBookData(newPagesVectors, newUndoStacks, newRedoStacks);
                }
                currentPathPoints.current = [];
            };

            // Undo/Redo (par livre)
            const undo = () => {
                const currentPaths = pagesVectors[currentPage] || [];
                if (currentPaths.length === 0) return;
                const lastPath = currentPaths[currentPaths.length - 1];
                const newPaths = currentPaths.slice(0, -1);
                const newPagesVectors = { ...pagesVectors, [currentPage]: newPaths };
                const newUndoStacks = { ...undoStacks, [currentPage]: (undoStacks[currentPage] || []).slice(0, -1) };
                const newRedoStacks = { ...redoStacks, [currentPage]: [...(redoStacks[currentPage] || []), lastPath] };
                updateBookData(newPagesVectors, newUndoStacks, newRedoStacks);
            };

            const redo = () => {
                const currentRedo = redoStacks[currentPage] || [];
                if (currentRedo.length === 0) return;
                const lastRedo = currentRedo[currentRedo.length - 1];
                const newRedoStack = currentRedo.slice(0, -1);
                const newPagesVectors = { ...pagesVectors, [currentPage]: [...(pagesVectors[currentPage] || []), lastRedo] };
                const newUndoStacks = { ...undoStacks, [currentPage]: [...(undoStacks[currentPage] || []), lastRedo] };
                const newRedoStacks = { ...redoStacks, [currentPage]: newRedoStack };
                updateBookData(newPagesVectors, newUndoStacks, newRedoStacks);
            };

            // Effacer page courante
            const clearCurrentPage = () => {
                const newPagesVectors = { ...pagesVectors, [currentPage]: [] };
                const newUndoStacks = { ...undoStacks, [currentPage]: [] };
                const newRedoStacks = { ...redoStacks, [currentPage]: [] };
                updateBookData(newPagesVectors, newUndoStacks, newRedoStacks);
                setShowConfirmClear(false);
                if (confirmTimeoutRef.current) clearTimeout(confirmTimeoutRef.current);
            };

            // ========== Gestion multi-livres ==========
            const switchBook = (bookName) => {
                if (books[bookName]) {
                    setCurrentBookName(bookName);
                    setCurrentPage(0);
                    setShowBookModal(false);
                    playBeep(660, 0.15, 0.15);
                }
            };

            const createNewBook = () => {
                const name = newBookName.trim();
                if (name === "") return;
                if (books[name]) {
                    alert("Ce livre existe déjà");
                    return;
                }
                setBooks(prev => ({ ...prev, [name]: { pagesVectors: {}, undoStacks: {}, redoStacks: {} } }));
                setCurrentBookName(name);
                setCurrentPage(0);
                setNewBookName("");
                setShowBookManageModal(false);
                playBeep(880, 0.2);
            };

            const deleteBook = (bookName) => {
                if (bookName === "Brouillon") {
                    alert("Le livre Brouillon ne peut pas être supprimé.");
                    return;
                }
                const newBooks = { ...books };
                delete newBooks[bookName];
                setBooks(newBooks);
                if (currentBookName === bookName) {
                    setCurrentBookName("Brouillon");
                    setCurrentPage(0);
                }
                setDeleteConfirm(null);
                setShowBookManageModal(false);
                playBeep(440, 0.2);
            };

            // Long press sur bouton livre
            const handleBookPressStart = () => {
                longPressTimer.current = setTimeout(() => {
                    setShowBookManageModal(true);
                    playBeep(520, 0.3, 0.2);
                }, 500);
            };

            const handleBookPressEnd = () => {
                if (longPressTimer.current) {
                    clearTimeout(longPressTimer.current);
                    longPressTimer.current = null;
                }
            };

            // Bouton livre (court = ouvrir sélecteur)
            const handleBookClick = () => {
                if (longPressTimer.current) return;
                setShowBookModal(true);
            };

            // Export PNG
            const exportAsPNG = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `${currentBookName}_page_${currentPage + 1}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 'image/png');
                playBeep(1000, 0.1);
            };

            // Gestion ratio écran
            const updateCanvasSize = useCallback(() => {
                const dpr = window.devicePixelRatio || 1;
                setCanvasSize({ width: Math.floor(DISPLAY_WIDTH * dpr), height: Math.floor(DISPLAY_HEIGHT * dpr) });
            }, []);

            useEffect(() => {
                updateCanvasSize();
                const mediaQuery = window.matchMedia(`(resolution: ${window.devicePixelRatio}dppx)`);
                mediaQuery.addEventListener('change', updateCanvasSize);
                return () => mediaQuery.removeEventListener('change', updateCanvasSize);
            }, [updateCanvasSize]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                canvas.width = canvasSize.width;
                canvas.height = canvasSize.height;
                canvas.style.width = `${DISPLAY_WIDTH}px`;
                canvas.style.height = `${DISPLAY_HEIGHT}px`;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                renderCanvas();
            }, [canvasSize, renderCanvas]);

            // Nettoyage
            useEffect(() => {
                return () => { if (confirmTimeoutRef.current) clearTimeout(confirmTimeoutRef.current); };
            }, []);

            const toggleDrawingMode = () => {
                setIsDrawingMode(prev => !prev);
                playBeep(isDrawingMode ? 660 : 880, 0.15);
            };

            return (
                <div className="fixed inset-0 bg-[#050505] flex items-center justify-center p-2 font-mono">
                    <div className="w-[360px] min-h-screen max-h-screen bg-[#0a0a0c] border border-[#2d2d3a] rounded-3xl shadow-[0_0_40px_rgba(0,242,255,0.05)] overflow-y-auto flex flex-col relative">
                        {/* Barre d'outils */}
                        <div className="flex flex-col p-4 border-b border-[#1e1e24] bg-[#0f0f12]/80 gap-3">
                            <div className="flex justify-between items-center">
                                <button onClick={toggleDrawingMode} className={`w-8 h-8 rounded-lg ${isDrawingMode ? 'bg-cyan-500/20 text-cyan-400' : 'bg-[#1a1a24] text-[#444]'}`}>🖊</button>
                                <div className="flex gap-2">
                                    <button onClick={undo} className="w-8 h-8 rounded-lg bg-[#1a1a24] text-[#888]">↶</button>
                                    <button onClick={redo} className="w-8 h-8 rounded-lg bg-[#1a1a24] text-[#888]">↷</button>
                                </div>
                            </div>
                            <div className="flex justify-center gap-1.5">
                                {colors.map((c) => (
                                    <button key={c} onClick={() => setSelectedColor(c)} className={`w-6 h-6 rounded-full shadow-[inset_2px_2px_4px_rgba(0,0,0,0.5)] border-2 ${selectedColor === c ? 'border-white' : 'border-transparent'}`} style={{ backgroundColor: c }} />
                                ))}
                            </div>
                            <div className="flex justify-center gap-2 mt-1">
                                <label className="text-xs text-gray-400">Épaisseur :</label>
                                <input type="range" min="1" max="10" step="0.5" value={selectedWidth} onChange={(e) => setSelectedWidth(parseFloat(e.target.value))} className="w-32" />
                                <span className="text-xs text-cyan-400">{selectedWidth}px</span>
                            </div>
                        </div>

                        {/* Zone de dessin */}
                        <canvas 
                            ref={canvasRef} 
                            className="touch-none cursor-crosshair w-full" 
                            style={{ width: `${DISPLAY_WIDTH}px`, height: `${DISPLAY_HEIGHT}px`, display: 'block', margin: '0 auto' }}
                            onMouseDown={startDrawing}
                            onMouseMove={draw}
                            onMouseUp={stopDrawing}
                            onMouseLeave={stopDrawing}
                            onTouchStart={startDrawing}
                            onTouchMove={(e) => { if(isDrawingMode) e.preventDefault(); draw(e); }}
                            onTouchEnd={stopDrawing}
                        />

                        {/* Footer avec boutons de navigation, actions et nom du livre */}
                        <div className="flex flex-col border-t border-[#1e1e24] bg-[#0f0f12]">
                            <div className="flex items-center justify-between gap-2 py-2 px-4">
                                <div className="flex items-center gap-6">
                                    <button onClick={() => setCurrentPage(p => Math.max(0, p-1))} className="w-10 h-10 rounded-full border border-[#2d2d3a] text-[#888]">◀</button>
                                    <button onClick={() => setShowSelector(true)} className="text-xl font-bold text-[#00f2ff]">{String(currentPage + 1).padStart(2, '0')}</button>
                                    <button onClick={() => setCurrentPage(p => p+1)} className="w-10 h-10 rounded-full border border-[#2d2d3a] text-[#888]">▶</button>
                                </div>

                                <div className="flex items-center gap-2">
                                    {!showConfirmClear ? (
                                        <>
                                            <button onClick={() => setShowConfirmClear(true)} className="w-10 h-10 rounded-full flex items-center justify-center border border-[#2d2d3a] bg-[#1a1a24] hover:bg-red-500/10">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className="text-gray-400">
                                                    <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                                    <line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" />
                                                </svg>
                                            </button>
                                            <button onClick={exportAsPNG} className="w-10 h-10 rounded-full flex items-center justify-center border border-[#2d2d3a] bg-[#1a1a24] hover:bg-cyan-500/10">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className="text-gray-400">
                                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                                    <polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" />
                                                </svg>
                                            </button>
                                            <button
                                                onMouseDown={handleBookPressStart}
                                                onMouseUp={handleBookPressEnd}
                                                onMouseLeave={handleBookPressEnd}
                                                onTouchStart={handleBookPressStart}
                                                onTouchEnd={handleBookPressEnd}
                                                onClick={handleBookClick}
                                                className="w-10 h-10 rounded-full flex items-center justify-center border border-[#2d2d3a] bg-[#1a1a24] hover:bg-indigo-500/10"
                                            >
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className="text-gray-400">
                                                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                                                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                                                </svg>
                                            </button>
                                            <img src="https://i.ibb.co/VWpZCsDr/dfg-1.png" alt="Logo" style={{ width: '36px', height: 'auto', opacity: 0.5 }} className="opacity-50 pointer-events-none select-none" />
                                        </>
                                    ) : (
                                        <div className="flex gap-2 items-center animate-pulse">
                                            <span className="text-xs text-red-400 font-mono">Vider ?</span>
                                            <button onClick={clearCurrentPage} className="w-8 h-8 rounded-full bg-red-500/20 border border-red-500 flex items-center justify-center">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-400"><polyline points="20 6 9 17 4 12" /></svg>
                                            </button>
                                            <button onClick={() => setShowConfirmClear(false)} className="w-8 h-8 rounded-full bg-gray-700/50 border border-gray-500 flex items-center justify-center">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-gray-300"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            {/* Affichage du nom du livre en bas */}
                            <div className="text-center text-[10px] text-gray-500 pb-2">
                                📖 {currentBookName}
                            </div>
                        </div>
                    </div>

                    {/* Modales existantes... */}
                    {showBookModal && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-[#121216] border border-[#2d2d3a] p-6 rounded-2xl w-64 text-center">
                                <p className="text-white mb-4 text-sm uppercase">Choisir un livre</p>
                                <div className="flex flex-col gap-2 max-h-48 overflow-y-auto mb-4">
                                    {Object.keys(books).map(book => (
                                        <button key={book} onClick={() => switchBook(book)} className="bg-[#1a1a24] py-2 rounded-lg text-cyan-400 hover:bg-[#2a2a34]">{book}</button>
                                    ))}
                                </div>
                                <button onClick={() => setShowBookModal(false)} className="w-full bg-gray-700 text-white py-2 rounded-lg">Fermer</button>
                            </div>
                        </div>
                    )}

                    {showBookManageModal && (
                        <div className="absolute inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-[#121216] border border-[#2d2d3a] p-6 rounded-2xl w-72">
                                <p className="text-white font-bold mb-3 text-center">Gérer les livres</p>
                                <div className="mb-4">
                                    <input type="text" placeholder="Nouveau livre" value={newBookName} onChange={(e) => setNewBookName(e.target.value)} className="w-full bg-[#1a1a24] text-white p-2 rounded-lg mb-2" />
                                    <button onClick={createNewBook} className="w-full bg-emerald-600 py-2 rounded-lg text-white">➕ Créer</button>
                                </div>
                                <div className="border-t border-gray-700 my-2"></div>
                                <p className="text-gray-400 text-sm mb-2">Supprimer un livre :</p>
                                <div className="flex flex-col gap-2 max-h-40 overflow-y-auto">
                                    {Object.keys(books).map(book => (
                                        <div key={book} className="flex justify-between items-center bg-[#1a1a24] p-2 rounded-lg">
                                            <span className="text-white text-sm">{book}</span>
                                            {book !== "Brouillon" && (
                                                <button onClick={() => setDeleteConfirm(book)} className="text-red-400 text-sm px-2 py-1 rounded bg-red-500/20">🗑</button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { setShowBookManageModal(false); setDeleteConfirm(null); }} className="w-full bg-gray-700 text-white py-2 rounded-lg mt-4">Fermer</button>
                            </div>
                        </div>
                    )}

                    {deleteConfirm && (
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-[#121216] border border-red-500 p-6 rounded-2xl w-64 text-center">
                                <p className="text-white mb-2">Supprimer "{deleteConfirm}" ?</p>
                                <p className="text-xs text-red-400 mb-4">Action irréversible</p>
                                <div className="flex gap-3">
                                    <button onClick={() => deleteBook(deleteConfirm)} className="flex-1 bg-red-600 py-2 rounded-lg">Oui</button>
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 bg-gray-700 py-2 rounded-lg">Non</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSelector && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-[#121216] border border-[#2d2d3a] p-6 rounded-2xl w-60 text-center">
                                <p className="text-white mb-4 text-sm uppercase">Aller à la page</p>
                                <input type="number" defaultValue={currentPage + 1} className="w-full bg-[#1a1a24] text-cyan-400 text-center p-3 rounded-lg mb-4" onChange={(e) => setCurrentPage(Math.max(0, parseInt(e.target.value) - 1))} />
                                <button onClick={() => setShowSelector(false)} className="w-full bg-cyan-500/20 text-cyan-400 py-2 rounded-lg">CONFIRMER</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CyberNotebookApp />);
    </script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
